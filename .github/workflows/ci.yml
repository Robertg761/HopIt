name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
    # Docs-only pushes don't need the full battery.
    paths-ignore:
      - '**.md'
  pull_request:
    paths-ignore:
      - '**.md'
  # Manual trigger for the macOS DMG build (kept off the per-push path because
  # macOS runner minutes bill at 10x and exhausted the Actions budget in July).
  workflow_dispatch:

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR branch).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Verify, test, build, and package
    runs-on: ubuntu-latest
    timeout-minutes: 35
    # No secrets/env are needed: the Next.js build degrades gracefully when
    # Clerk keys are absent (see src/lib/auth-config.ts), and the agent test
    # suite runs hermetically via HOPIT_NO_ENV_FILE=1/HOPIT_JSON=1 (see the
    # agent:test script). Verified by building/testing with no .env.local and
    # the Clerk vars unset.
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run typecheck:agent
      - run: npm run test:all
      - run: npm run test:desktop
      - run: npm run build
      # Cross-platform packaging is main-only: PRs get the quality gates above,
      # pushes to main additionally prove the artifacts still build.
      - if: github.event_name != 'pull_request'
        run: npm run package:hop -- --target all
      - if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: hop-runtimes
          path: |
            artifacts/hop-*.tar.gz
            artifacts/hop-*.tar.gz.sha256
          if-no-files-found: error
          retention-days: 7

  macos-dmg:
    name: Build macOS DMG
    # macOS minutes bill at 10x Linux; build the DMG on demand or on release
    # tags instead of every push. Distribution DMGs ship via release:hop anyway.
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    runs-on: macos-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm
      - run: npm ci
      - run: npm run package:hop:dmg
      - uses: actions/upload-artifact@v4
        with:
          name: hop-macos-dmg
          path: |
            artifacts/HopIt-macOS.dmg
            artifacts/HopIt-macOS.dmg.sha256
          if-no-files-found: error
          retention-days: 7
